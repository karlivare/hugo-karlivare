    <script>
        // Define variables
        const container = document.getElementById("flower-svg");
        const clip = document.getElementById("clip");
    
        // Define transform origin function
        function setTransformOrigin() {
            const containerRect = container.getBoundingClientRect();
            const clipRect = clip.getBoundingClientRect();
            const centerX = containerRect.width / 2;
            const centerY = containerRect.height / 2;
    
            // Calculate distance of clip from center of container
            const distanceX = Math.abs(clipRect.left + clipRect.width / 2 - containerRect.left - centerX);
            const distanceY = Math.abs(clipRect.top + clipRect.height / 2 - containerRect.top - centerY);
    
            // Set a threshold distance to determine if transform origin should be adjusted
            const thresholdDistance = 200;
    
            // Check if the browser is Safari
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

            // Log values for debugging
            console.log("centerX: " + centerX);
            console.log("centerY: " + centerY);
    
            // Check if clip is moving too far from center
            if (distanceX > thresholdDistance || distanceY > thresholdDistance) {
                if (isSafari) {
                    // Use different transform origin for Safari
                    clip.style.transformOrigin = `${centerX / 2}px ${centerY / 2}px`;
                    console.log("Safari transform origin adjusted to half:", clip.style.transformOrigin);
                } else {
                    // Adjust transform origin to half of container dimensions
                    clip.style.transformOrigin = `${centerX / 2}px ${centerY / 2}px`;
                    console.log("Chrome transform origin adjusted to half:", clip.style.transformOrigin);
                }
            } else {
                if (isSafari) {
                    // Use default transform origin for Safari
                    clip.style.transformOrigin = `${centerX}px ${centerY}px`;
                    console.log("Safari default transform origin set:", clip.style.transformOrigin);
                } else {
                    // Use default transform origin for other browsers
                    clip.style.transformOrigin = `${centerX}px ${centerY}px`;
                    console.log("Chrome default transform origin set:", clip.style.transformOrigin);
                }
            }
    
            // Log applied transform-origin for debugging
            console.log("Applied transform origin:", getComputedStyle(clip).transformOrigin);
        }
    
        // Call the function initially with a delay after DOMContentLoaded
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                setTransformOrigin();
                clip.classList.add('animate-flower');
            }, 1000); // 1-second delay
        });
    
        // Add event listener for window resize to reset the transform origin
        window.addEventListener('resize', setTransformOrigin);
    </script>
