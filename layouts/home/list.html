    <script>
    // Define variables
    const container = document.getElementById("flower-svg");
    const clip = document.getElementById("clip");

    // Define transform origin function
    function setTransformOrigin() {
        const containerRect = container.getBoundingClientRect();
        const centerX = containerRect.width / 2;
        const centerY = containerRect.height / 2;

        // Check if the browser is Safari
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        // Check if the browser is Chrome
        const isChrome = /Chrome\/[\d.]+/.test(navigator.userAgent);

        // Check if the platform is x86_64 (Intel 64-bit architecture)
        const isIntel64 = /x86_64/.test(navigator.platform);

        //testing another way of detecting intel chrome browser
        // Get the user agent string of the browser
        var userAgent = navigator.userAgent;

        // Check if the user agent contains "(x86_64)"
        if (userAgent.includes('(x86_64)')) {
            alert('This browser is running on x86_64 architecture.');
        } 
        // Check if the user agent contains "arm64"
        else if (userAgent.includes('arm64')) {
            alert('This browser is running on arm64 architecture.');
        }
        // If neither pattern is found
        else {
            alert('Unable to determine the architecture of this browser.');
        }

        // Set transform origin based on browser and platform
        if (isSafari) {
            clip.style.transformOrigin = `${centerX}px ${centerY}px`;
            console.log("Safari transform origin set:", clip.style.transformOrigin);
        } else if (isChrome && isIntel64) {
            // for x86_64 Chrome
            clip.style.transformOrigin = `${centerX*2}px ${centerY*2}px`;
            console.log("x86_64 Chrome transform origin set:", clip.style.transformOrigin);
        } else {
            clip.style.transformOrigin = `${centerX}px ${centerY}px`;
            console.log("Default transform origin set:", clip.style.transformOrigin);
        }

        // Log applied transform-origin for debugging
        console.log("Applied transform origin:", getComputedStyle(clip).transformOrigin);
    }

    // Call the function initially with a delay after DOMContentLoaded
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            setTransformOrigin();
            clip.classList.add('animate-flower');
        }, 1000); // 1-second delay
    });

    // Add event listener for window resize to reset the transform origin
    window.addEventListener('resize', setTransformOrigin);
</script>
